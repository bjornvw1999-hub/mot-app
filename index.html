<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mot Proef">
<title>Turkse Mot Proef</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --green: #3B6D11; --green-light: #EAF3DE; --green-mid: #639922;
    --amber: #854F0B; --amber-light: #FAEEDA; --amber-mid: #EF9F27; --amber-border: #BA7517;
    --gray-bg: #F7F6F3; --gray-border: rgba(0,0,0,0.1); --gray-border-strong: rgba(0,0,0,0.18);
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-tertiary: #9a9890;
    --radius-md: 8px; --radius-lg: 14px; --radius-xl: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-bg); color: var(--text-primary); min-height: 100vh; padding-bottom: 2rem; }
  .app-header { background: #fff; border-bottom: 0.5px solid var(--gray-border); padding: 1rem 1.25rem 0.75rem; position: sticky; top: 0; z-index: 100; }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .app-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .app-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
  .sync-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); background: var(--gray-bg); border: 0.5px solid var(--gray-border); border-radius: 99px; padding: 4px 10px; cursor: pointer; user-select: none; }
  .sync-badge:active { opacity: .7; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-mid); flex-shrink: 0; }
  .sync-dot.err { background: #E24B4A; }
  .sync-dot.load { background: var(--amber-mid); animation: blink .8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .error-banner { display: none; background: #FEF2F2; border-bottom: 1px solid #FECACA; padding: .6rem 1.25rem; font-size: 12px; color: #991B1B; line-height: 1.6; }
  .error-banner.show { display: block; }
  .error-banner a { color: #7F1D1D; font-weight: 600; }
  .error-banner code { background: rgba(0,0,0,.08); border-radius: 3px; padding: 0 4px; font-size: 11px; font-family: monospace; }
  .tabs { display: flex; background: #fff; border-bottom: 0.5px solid var(--gray-border); padding: 0 1rem; }
  .tab { flex: 1; text-align: center; padding: .65rem .5rem; font-size: 13px; font-weight: 500; color: var(--text-tertiary); cursor: pointer; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; user-select: none; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .page { display: none; padding: 1rem 1rem 0; }
  .page.active { display: block; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1rem; }
  .stat-card { background: #fff; border-radius: var(--radius-md); border: 0.5px solid var(--gray-border); padding: .7rem .75rem; }
  .stat-label { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
  .stat-value { font-size: 22px; font-weight: 600; color: var(--text-primary); line-height: 1; }
  .stat-value.amber { color: var(--amber); }
  .stat-sub { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }
  .date-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; background: #fff; border: 0.5px solid var(--gray-border); border-radius: var(--radius-md); padding: .5rem .75rem; }
  .date-bar label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  .date-bar input[type=date] { flex: 1; border: none; outline: none; font-size: 13px; font-weight: 500; color: var(--text-primary); background: transparent; cursor: pointer; font-family: inherit; }
  .today-btn { font-size: 11px; color: var(--green); background: var(--green-light); border: none; border-radius: 99px; padding: 3px 9px; cursor: pointer; font-weight: 500; white-space: nowrap; }
  .section-lbl { font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .7px; margin: .25rem 0 .5rem; }
  .tralie-list { display: flex; flex-direction: column; gap: 8px; }
  .tralie-card { background: #fff; border: 0.5px solid var(--gray-border); border-radius: var(--radius-lg); overflow: hidden; }
  .tralie-card.has-data { border-color: var(--amber-mid); }
  .tralie-hdr { display: flex; align-items: center; gap: 10px; padding: .75rem 1rem; cursor: pointer; user-select: none; }
  .tralie-num { width: 38px; height: 38px; border-radius: var(--radius-md); border: 0.5px solid var(--gray-border); background: var(--gray-bg); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: var(--text-secondary); flex-shrink: 0; }
  .tralie-num.warm { background: var(--amber-light); border-color: var(--amber-mid); color: var(--amber); }
  .tralie-info { flex: 1; min-width: 0; }
  .tralie-name { font-size: 14px; font-weight: 600; }
  .tralie-detail { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
  .tralie-badge { font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 99px; background: var(--gray-bg); color: var(--text-secondary); border: 0.5px solid var(--gray-border); white-space: nowrap; }
  .tralie-badge.warm { background: var(--amber-light); color: var(--amber); border-color: var(--amber-mid); }
  .chevron { font-size: 18px; color: var(--text-tertiary); transition: transform .2s; flex-shrink: 0; line-height: 1; }
  .chevron.open { transform: rotate(180deg); }
  .poten-body { display: none; border-top: 0.5px solid var(--gray-border); background: #FAFAF8; }
  .poten-body.open { display: block; }
  .side-section { padding: .6rem 1rem; }
  .side-section + .side-section { border-top: 0.5px solid var(--gray-border); }
  .side-label { font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .6px; margin-bottom: .4rem; }
  .poot-row { display: flex; align-items: center; justify-content: space-between; padding: .35rem 0; }
  .poot-row + .poot-row { border-top: 0.5px solid rgba(0,0,0,.05); }
  .poot-lbl { font-size: 13px; color: var(--text-secondary); }
  .counter { display: flex; align-items: center; gap: 10px; }
  .cbtn { width: 32px; height: 32px; border-radius: 50%; border: 0.5px solid var(--gray-border-strong); background: #fff; color: var(--text-primary); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .1s, background .1s; line-height: 1; }
  .cbtn:active { background: var(--gray-bg); transform: scale(.9); }
  .cval { font-size: 17px; font-weight: 600; min-width: 28px; text-align: center; color: var(--text-tertiary); }
  .cval.nonzero { color: var(--amber-border); }
  .history-empty { text-align: center; color: var(--text-tertiary); font-size: 14px; padding: 3rem 1rem; }
  .hist-day { margin-bottom: 1.5rem; }
  .hist-day-lbl { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .6px; margin-bottom: .5rem; padding-bottom: .35rem; border-bottom: 0.5px solid var(--gray-border); }
  .hist-entry { background: #fff; border: 0.5px solid var(--gray-border); border-radius: var(--radius-md); padding: .6rem .85rem; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
  .hist-loc { font-size: 13px; font-weight: 500; }
  .hist-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
  .hist-count { font-size: 16px; font-weight: 600; color: var(--amber); background: var(--amber-light); padding: 2px 10px; border-radius: 99px; border: 0.5px solid var(--amber-mid); }
  .chart-wrap { background: #fff; border: 0.5px solid var(--gray-border); border-radius: var(--radius-lg); padding: 1rem; margin-bottom: 1rem; }
  .chart-title { font-size: 13px; font-weight: 600; margin-bottom: .75rem; color: var(--text-secondary); }
  .chart-canvas-wrap { position: relative; height: 200px; }
  .chart-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: .75rem; }
  .cf-btn { font-size: 11px; padding: 3px 10px; border-radius: 99px; border: 0.5px solid var(--gray-border); background: var(--gray-bg); color: var(--text-secondary); cursor: pointer; font-weight: 500; }
  .cf-btn.active { background: var(--green-light); color: var(--green); border-color: var(--green-mid); }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1a18; color: #fff; font-size: 13px; padding: .5rem 1.1rem; border-radius: 99px; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-row">
    <div>
      <div class="app-title">Turkse mot proef</div>
      <div class="app-sub">Valtelling — links &amp; rechts</div>
    </div>
    <div class="sync-badge" onclick="window.syncNow()" title="Tik om te vernieuwen">
      <div class="sync-dot load" id="syncDot"></div>
      <span id="syncTxt">Verbinden…</span>
    </div>
  </div>
</div>
<div class="error-banner" id="errorBanner"></div>

<div class="tabs">
  <div class="tab active" onclick="showTab('invoer')">Invoer</div>
  <div class="tab" onclick="showTab('grafiek')">Grafiek</div>
  <div class="tab" onclick="showTab('geschiedenis')">Geschiedenis</div>
</div>

<div class="page active" id="tab-invoer">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Totaal</div><div class="stat-value amber" id="statTotaal">0</div><div class="stat-sub">motten</div></div>
    <div class="stat-card"><div class="stat-label">Links</div><div class="stat-value" id="statLinks">0</div><div class="stat-sub">motten</div></div>
    <div class="stat-card"><div class="stat-label">Rechts</div><div class="stat-value" id="statRechts">0</div><div class="stat-sub">motten</div></div>
  </div>
  <div class="date-bar">
    <label>Datum:</label>
    <input type="date" id="datumInput">
    <button class="today-btn" onclick="setToday()">Vandaag</button>
  </div>
  <div class="section-lbl">Tralies</div>
  <div class="tralie-list" id="tralieList"></div>
</div>

<div class="page" id="tab-grafiek">
  <div class="chart-filter">
    <div class="cf-btn active" data-filter="totaal" onclick="setFilter(this)">Totaal</div>
    <div class="cf-btn" data-filter="links" onclick="setFilter(this)">Links</div>
    <div class="cf-btn" data-filter="rechts" onclick="setFilter(this)">Rechts</div>
  </div>
  <div class="chart-wrap"><div class="chart-title">Mottenverloop per dag</div><div class="chart-canvas-wrap"><canvas id="trendChart"></canvas></div></div>
  <div class="chart-wrap"><div class="chart-title">Verdeling per tralie (laatste meting)</div><div class="chart-canvas-wrap"><canvas id="tralieChart"></canvas></div></div>
</div>

<div class="page" id="tab-geschiedenis">
  <div id="histContent"><div class="history-empty">Nog geen tellingen ingevoerd.</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, onValue, set, goOnline, goOffline } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

// ── Firebase config (vast ingesteld) ──────────────────────
const FB_CONFIG = {
  apiKey: "AIzaSyCzlBMdsh9TxCG--3xqUIaYss0KgU6fbw",
  authDomain: "telling-turkse-mot-vallen.firebaseapp.com",
  databaseURL: "https://telling-turkse-mot-vallen-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "telling-turkse-mot-vallen",
  storageBucket: "telling-turkse-mot-vallen.firebasestorage.app",
  messagingSenderId: "116245505945",
  appId: "1:116245505945:web:18f01585fe4bae834cd508"
};

const TRALIES = [
  { nr: 51, poten: [5, 12] }, { nr: 45, poten: [9] }, { nr: 41, poten: [9] },
  { nr: 36, poten: [9] }, { nr: 32, poten: [9] }, { nr: 28, poten: [12] },
  { nr: 24, poten: [9] }, { nr: 20, poten: [12] }, { nr: 16, poten: [9] },
  { nr: 12, poten: [9] }, { nr: 8, poten: [9] }, { nr: 4, poten: [9] },
  { nr: 1, poten: [5, 12] },
];
const SIDES = ['links', 'rechts'];
let db, allData = {}, openCards = new Set(), chartFilter = 'totaal';
let trendChartInst = null, tralieChartInst = null;

// ── Init ──────────────────────────────────────────────────
try {
  const app = initializeApp(FB_CONFIG);
  db = getDatabase(app);
  setSyncStatus('Verbinden…', true, false);

  // Connection state monitor
  onValue(ref(db, '.info/connected'), snap => {
    if (snap.val() === true) { setSyncStatus('Live ↺', false, false); hideError(); }
    else { setSyncStatus('Offline', false, true); }
  });

  // Data listener
  onValue(ref(db, 'mottellingen'), snap => {
    allData = snap.val() || {};
    renderInvoer();
    if (document.getElementById('tab-geschiedenis').classList.contains('active')) renderGeschiedenis();
    if (document.getElementById('tab-grafiek').classList.contains('active')) renderCharts();
    setSyncStatus('Live ↺', false, false);
    hideError();
  }, err => {
    setSyncStatus('Geen toegang', false, true);
    showError('<strong>🔒 Database-toegang geblokkeerd.</strong> Ga naar <a href="https://console.firebase.google.com" target="_blank">Firebase Console</a> → Realtime Database → Regels → zet <code>".read": true</code> en <code>".write": true</code> → Publiceren.');
  });
} catch(e) {
  setSyncStatus('Fout', false, true);
  showError('Firebase fout: ' + e.message);
}

// ── Save ──────────────────────────────────────────────────
let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    setSyncStatus('Opslaan…', true, false);
    try {
      await set(ref(db, 'mottellingen'), allData);
      setSyncStatus('Live ↺', false, false);
    } catch(e) {
      setSyncStatus('Fout', false, true);
      showError('Opslaan mislukt: ' + e.message);
    }
  }, 600);
}

window.syncNow = function() {
  setSyncStatus('Vernieuwen…', true, false);
  hideError();
  goOffline(db);
  setTimeout(() => goOnline(db), 600);
};

// ── Helpers ───────────────────────────────────────────────
function today() { return new Date().toISOString().slice(0, 10); }
function datumLabel(d) { return d ? new Date(d + 'T12:00:00').toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' }) : ''; }
function key(datum, tralie, poot, side) { return datum + '__t' + tralie + '__p' + poot + '__' + side; }
function getVal(datum, tralie, poot, side) { return (allData[key(datum, tralie, poot, side)] || {}).count || 0; }
function setVal(datum, tralie, poot, side, val) {
  const k = key(datum, tralie, poot, side);
  if (val === 0) { delete allData[k]; } else { allData[k] = { count: val, datum, tralie, poot, side, ts: Date.now() }; }
}
function selectedDate() { return document.getElementById('datumInput').value || today(); }
function calcStats(datum) {
  let totaal = 0, links = 0, rechts = 0;
  TRALIES.forEach(t => t.poten.forEach(p => { const l = getVal(datum, t.nr, p, 'links'), r = getVal(datum, t.nr, p, 'rechts'); links += l; rechts += r; totaal += l + r; }));
  return { totaal, links, rechts };
}
function updateStats() { const s = calcStats(selectedDate()); document.getElementById('statTotaal').textContent = s.totaal; document.getElementById('statLinks').textContent = s.links; document.getElementById('statRechts').textContent = s.rechts; }

// ── Render ────────────────────────────────────────────────
function renderInvoer() {
  const datum = selectedDate();
  const list = document.getElementById('tralieList');
  list.innerHTML = '';
  TRALIES.forEach(t => {
    let tot = 0;
    SIDES.forEach(s => t.poten.forEach(p => { tot += getVal(datum, t.nr, p, s); }));
    const warm = tot > 0, isOpen = openCards.has(t.nr);
    const card = document.createElement('div');
    card.className = 'tralie-card' + (warm ? ' has-data' : '');
    const potenHtml = SIDES.map(side => `
      <div class="side-section">
        <div class="side-label">${side === 'links' ? 'Links' : 'Rechts'}</div>
        ${t.poten.map(p => `
          <div class="poot-row">
            <div class="poot-lbl">Poot ${p}</div>
            <div class="counter">
              <button class="cbtn" onclick="window.changeVal('${datum}',${t.nr},${p},'${side}',-1)">−</button>
              <span class="cval${getVal(datum, t.nr, p, side) > 0 ? ' nonzero' : ''}" id="v_${t.nr}_${p}_${side}">${getVal(datum, t.nr, p, side)}</span>
              <button class="cbtn" onclick="window.changeVal('${datum}',${t.nr},${p},'${side}',1)">+</button>
            </div>
          </div>`).join('')}
      </div>`).join('');
    card.innerHTML = `
      <div class="tralie-hdr" onclick="window.toggleCard(${t.nr},this)">
        <div class="tralie-num${warm ? ' warm' : ''}">${t.nr}</div>
        <div class="tralie-info">
          <div class="tralie-name">Tralie ${t.nr}</div>
          <div class="tralie-detail">Poot${t.poten.length > 1 ? 'en' : ''} ${t.poten.join(' & ')} · L + R</div>
        </div>
        <span class="tralie-badge${warm ? ' warm' : ''}" id="badge_${t.nr}">${tot} mot${tot !== 1 ? 'ten' : ''}</span>
        <span class="chevron${isOpen ? ' open' : ''}">›</span>
      </div>
      <div class="poten-body${isOpen ? ' open' : ''}">${potenHtml}</div>`;
    list.appendChild(card);
  });
  updateStats();
}

window.toggleCard = function(nr, hdr) {
  const card = hdr.closest('.tralie-card'), body = card.querySelector('.poten-body'), ch = hdr.querySelector('.chevron');
  if (body.classList.contains('open')) { openCards.delete(nr); body.classList.remove('open'); ch.classList.remove('open'); }
  else { openCards.add(nr); body.classList.add('open'); ch.classList.add('open'); }
};

window.changeVal = function(datum, tralie, poot, side, delta) {
  const nv = Math.max(0, getVal(datum, tralie, poot, side) + delta);
  setVal(datum, tralie, poot, side, nv);
  const el = document.getElementById('v_' + tralie + '_' + poot + '_' + side);
  if (el) { el.textContent = nv; el.className = 'cval' + (nv > 0 ? ' nonzero' : ''); }
  const t = TRALIES.find(x => x.nr === tralie);
  if (t) {
    let tot = 0; SIDES.forEach(s => t.poten.forEach(p => { tot += getVal(datum, t.nr, p, s); }));
    const badge = document.getElementById('badge_' + tralie);
    if (badge) { badge.textContent = tot + ' mot' + (tot !== 1 ? 'ten' : ''); badge.className = 'tralie-badge' + (tot > 0 ? ' warm' : ''); }
    const card = badge ? badge.closest('.tralie-card') : null;
    if (card) { card.className = 'tralie-card' + (tot > 0 ? ' has-data' : ''); const num = card.querySelector('.tralie-num'); if (num) num.className = 'tralie-num' + (tot > 0 ? ' warm' : ''); }
  }
  updateStats(); scheduleSave();
};

window.setToday = function() { document.getElementById('datumInput').value = today(); renderInvoer(); };
document.getElementById('datumInput').addEventListener('change', () => { openCards.clear(); renderInvoer(); });

// ── Tabs ──────────────────────────────────────────────────
window.showTab = function(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.tab')[['invoer','grafiek','geschiedenis'].indexOf(tab)].classList.add('active');
  if (tab === 'grafiek') renderCharts();
  if (tab === 'geschiedenis') renderGeschiedenis();
};

// ── Geschiedenis ──────────────────────────────────────────
function renderGeschiedenis() {
  const el = document.getElementById('histContent'), byDay = {};
  Object.values(allData).forEach(e => { if (!e || !e.datum) return; if (!byDay[e.datum]) byDay[e.datum] = []; byDay[e.datum].push(e); });
  const days = Object.keys(byDay).sort().reverse();
  if (!days.length) { el.innerHTML = '<div class="history-empty">Nog geen tellingen ingevoerd.</div>'; return; }
  el.innerHTML = days.map(d => {
    const entries = byDay[d], totDay = entries.reduce((s, e) => s + (e.count || 0), 0);
    const rows = entries.filter(e => e.count > 0).sort((a, b) => b.count - a.count).map(e => `
      <div class="hist-entry">
        <div><div class="hist-loc">Tralie ${e.tralie} · Poot ${e.poot} · ${e.side === 'links' ? 'Links' : 'Rechts'}</div><div class="hist-meta">${datumLabel(e.datum)}</div></div>
        <span class="hist-count">${e.count}</span>
      </div>`).join('');
    return `<div class="hist-day"><div class="hist-day-lbl">${datumLabel(d)} — ${totDay} motten</div>${rows}</div>`;
  }).join('');
}

// ── Charts ────────────────────────────────────────────────
window.setFilter = function(btn) { document.querySelectorAll('.cf-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); chartFilter = btn.dataset.filter; renderCharts(); };

function renderCharts() {
  const byDay = {};
  Object.values(allData).forEach(e => { if (!e || !e.datum) return; if (!byDay[e.datum]) byDay[e.datum] = { totaal: 0, links: 0, rechts: 0 }; const c = e.count || 0; byDay[e.datum].totaal += c; if (e.side === 'links') byDay[e.datum].links += c; else byDay[e.datum].rechts += c; });
  const days = Object.keys(byDay).sort();
  const labels = days.map(d => new Date(d + 'T12:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' }));
  const values = days.map(d => byDay[d][chartFilter] || 0);
  const color = chartFilter === 'links' ? '#378ADD' : chartFilter === 'rechts' ? '#1D9E75' : '#BA7517';
  const colorLight = chartFilter === 'links' ? '#E6F1FB' : chartFilter === 'rechts' ? '#E1F5EE' : '#FAEEDA';

  if (trendChartInst) trendChartInst.destroy();
  trendChartInst = new Chart(document.getElementById('trendChart').getContext('2d'), {
    type: 'line',
    data: { labels: labels.length ? labels : ['Geen data'], datasets: [{ data: values.length ? values : [0], borderColor: color, backgroundColor: colorLight, fill: true, tension: 0.3, pointBackgroundColor: color, pointRadius: 4, borderWidth: 2 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { precision: 0, font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.06)' } }, x: { ticks: { font: { size: 10 } }, grid: { display: false } } } }
  });

  const latestDate = days[days.length - 1];
  const tralieVals = TRALIES.map(t => { if (!latestDate) return 0; let tot = 0; const sides = chartFilter === 'totaal' ? SIDES : [chartFilter]; sides.forEach(s => t.poten.forEach(p => { tot += getVal(latestDate, t.nr, p, s); })); return tot; });
  if (tralieChartInst) tralieChartInst.destroy();
  tralieChartInst = new Chart(document.getElementById('tralieChart').getContext('2d'), {
    type: 'bar',
    data: { labels: TRALIES.map(t => 'T' + t.nr), datasets: [{ data: tralieVals, backgroundColor: tralieVals.map(v => v > 0 ? color : 'rgba(0,0,0,.07)'), borderRadius: 4, borderSkipped: false }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { precision: 0, font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.06)' } }, x: { ticks: { font: { size: 9 } }, grid: { display: false } } } }
  });
}

// ── UI helpers ────────────────────────────────────────────
function setSyncStatus(msg, loading, error) { document.getElementById('syncTxt').textContent = msg; document.getElementById('syncDot').className = 'sync-dot' + (loading ? ' load' : error ? ' err' : ''); }
function showError(html) { const b = document.getElementById('errorBanner'); b.innerHTML = html; b.classList.add('show'); }
function hideError() { document.getElementById('errorBanner').classList.remove('show'); }
let toastTimer;
window.showToast = function(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2500); };

// ── Boot ──────────────────────────────────────────────────
document.getElementById('datumInput').value = today();
renderInvoer();
</script>
